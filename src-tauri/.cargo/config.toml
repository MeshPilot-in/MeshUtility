[build]
# whisper.cpp's Vulkan shader generator creates very deep MSBuild paths. Keep
# the Cargo target root short so Windows file-tracking logs stay under limits.
target-dir = "C:\\mu-target"

[env]
# whisper-rs-sys builds whisper.cpp through the `cmake` crate. Some Windows
# installs have CMake in the default location without adding it to PATH.
CMAKE = { value = "C:\\Program Files\\CMake\\bin\\cmake.exe", force = false }
CMAKE_GENERATOR = { value = "Visual Studio 17 2022", force = false }
CMAKE_GENERATOR_PLATFORM = { value = "x64", force = false }
# whisper.cpp's Vulkan backend needs the SDK at compile time. The runtime app
# only needs the user's GPU driver/Vulkan runtime.
VULKAN_SDK = { value = "C:\\VulkanSDK\\1.4.350.0", force = false }
