name: Release V1

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libasound2-dev pkg-config

      - name: Build native whisper-cli (macOS & Linux)
        if: matrix.platform != 'windows-latest'
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git
          cd whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          mkdir -p ../src-tauri/bin/whisper
          cp build/bin/whisper-cli ../src-tauri/bin/whisper/

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = '1.4.350.0'
          $sdkRoot = "C:\VulkanSDK\$version"
          if (-not (Test-Path "$sdkRoot\Bin\glslc.exe")) {
            $installer = Join-Path $env:RUNNER_TEMP "vulkansdk-windows-X64-$version.exe"
            Invoke-WebRequest "https://sdk.lunarg.com/sdk/download/$version/windows/vulkansdk-windows-X64-$version.exe" -OutFile $installer
            Start-Process -FilePath $installer -ArgumentList '--root', $sdkRoot, '--accept-licenses', '--default-answer', '--confirm-command', 'install' -Wait
          }
          "VULKAN_SDK=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PATH=$sdkRoot\Bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE=C:\Program Files\CMake\bin\cmake.exe" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_GENERATOR=Visual Studio 17 2022" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CMAKE_GENERATOR_PLATFORM=x64" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> C:\mu-target'

      - name: Install dependencies
        run: npm install

      - name: Build frontend & Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MeshUtility ${{ github.ref_name }}'
          releaseBody: 'MeshUtility V1 standalone cross-platform release. stand-alone Tray-resident utility for AI voice dictation and prompt rewriting.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
